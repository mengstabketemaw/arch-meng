$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/hypr/scripts

# Applications
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, B, exec, chromium
bind = $mainMod, E, exec, nautilus --new-window
bind = $mainMod CTRL, E, exec, flatpak run com.tomjwatson.Emote
bind = $mainMod CTRL, C, exec, flatpak run org.gnome.Calculator
bind = $mainMod CTRL, RETURN, exec, rofi -show drun

# Display zoom
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# Window management
bind = $mainMod, W, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, M, exec, spotify-launcher
bind = $mainMod, T, exec, Telegram
bind = $mainMod, U, layoutmsg, togglesplit
bind = $mainMod, I, layoutmsg, swapsplit

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Swap windows
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d

# Resize
bind = $mainMod SHIFT, L, resizeactive, 100 0
bind = $mainMod SHIFT, H, resizeactive, -100 0
bind = $mainMod SHIFT, J, resizeactive, 0 100
bind = $mainMod SHIFT, K, resizeactive, 0 -100

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, G, togglegroup
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

# Actions
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh
bind = $mainMod ALT, F, exec, $HYPRSCRIPTS/screenshot.sh --instant
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area
bind = $mainMod, DELETE, exec, $HYPRSCRIPTS/text-extractor.sh
bind = $mainMod CTRL, P, exec, qs ipc call power toggle
bind = $mainMod, V, exec, $SCRIPTS/cliphist.sh
bind = $mainMod CTRL, L, exec, pidof hyprlock || hyprlock

# Waybar
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh

# Quickshell widgets
bind = $mainMod CTRL, S, exec, qs ipc call sidebar toggle
bind = $mainMod CTRL, C, exec, qs ipc call calendar toggle

# Wallpaper
bind = $mainMod SHIFT, W, exec, $SCRIPTS/wallpaper-app.sh --random
bind = $mainMod CTRL, W, exec, $SCRIPTS/wallpaper-app.sh
bind = $mainMod ALT, W, exec, $SCRIPTS/wallpaper-automation.sh

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, down, workspace, empty

# Multimedia keys
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86Calculator, exec, flatpak run org.gnome.Calculator
bind = , XF86Lock, exec, hyprlock

# Keyboard backlight
bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-
